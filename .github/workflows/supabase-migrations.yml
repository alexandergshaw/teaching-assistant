name: Apply Supabase migrations

# Applies any pending SQL files in supabase/migrations/ to the linked Supabase
# project. Runs when migrations change on main, or manually from the Actions tab.
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   SUPABASE_ACCESS_TOKEN  - personal access token (supabase.com/dashboard/account/tokens)
#   SUPABASE_PROJECT_ID    - project Reference ID (Project Settings > General)
#   SUPABASE_DB_PASSWORD   - database password (Project Settings > Database)

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install the Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link the Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Apply pending migrations
        run: supabase db push
