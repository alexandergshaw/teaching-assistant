name: Apply Supabase migrations

# Applies any pending SQL files in supabase/migrations/ to the linked Supabase
# project. Runs when migrations change on main, or manually from the Actions tab.
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   SUPABASE_ACCESS_TOKEN  - personal access token (supabase.com/dashboard/account/tokens)
#   SUPABASE_PROJECT_ID    - project Reference ID (Project Settings > General)
#   SUPABASE_DB_PASSWORD   - database password (Project Settings > Database)
#
# Manually re-triggered to apply the pending microsoft_credentials and
# syllabus_templates migrations.

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

# Serialize migration runs so two quick pushes never apply migrations at the same
# time, and never cancel a run mid-apply (a half-applied migration is worse than a
# queued one).
concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Fail early with a clear message if secrets are missing
        run: |
          missing=""
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then missing="$missing SUPABASE_ACCESS_TOKEN"; fi
          if [ -z "$SUPABASE_PROJECT_ID" ]; then missing="$missing SUPABASE_PROJECT_ID"; fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then missing="$missing SUPABASE_DB_PASSWORD"; fi
          if [ -n "$missing" ]; then
            echo "::error::Migrations not applied - missing repository secret(s):$missing"
            {
              echo "## Supabase migrations were NOT applied"
              echo ""
              echo "Missing required repository secret(s):$missing"
              echo ""
              echo "Add them under Settings > Secrets and variables > Actions:"
              echo "- SUPABASE_ACCESS_TOKEN  (supabase.com/dashboard/account/tokens)"
              echo "- SUPABASE_PROJECT_ID    (Project Settings > General > Reference ID)"
              echo "- SUPABASE_DB_PASSWORD   (Project Settings > Database)"
              echo ""
              echo "Until then, apply the SQL in supabase/migrations/ manually in the Supabase SQL editor."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "All required secrets are present."

      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install the Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link the Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Apply pending migrations
        run: supabase db push
